<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chá de Bebê do Davi 🦕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #e8e5db;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: 'Nunito', sans-serif;
    }

    .card {
      background: #f5f2ea;
      border-radius: 28px;
      max-width: 460px;
      width: 100%;
      overflow: hidden;
      position: relative;
      border: 1.5px solid #c9b97a;
    }

    .header {
      background: #7d8c6e;
      padding: 40px 28px 72px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 56px;
      background: #f5f2ea;
      border-radius: 50% 50% 0 0 / 38px 38px 0 0;
    }

    .leaf-bg {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; pointer-events: none;
    }

    .hdr-tag {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c9b97a;
      margin-bottom: 8px;
    }

    .hdr-name {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      color: #f5f2ea;
      line-height: 1;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .hdr-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 16px;
      color: #c9b97a;
      letter-spacing: 1px;
    }

    .balloon-row {
      position: absolute;
      top: 10px; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 0 14px;
      pointer-events: none;
    }

    .balloon {
      width: 20px; height: 26px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      animation: floatB 3s ease-in-out infinite;
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 1px; height: 7px;
      background: rgba(201,185,122,0.5);
    }

    .bg  { background: #9aaa88; animation-delay: 0s; }
    .gg  { background: #c9b97a; animation-delay: 0.5s; }
    .bw  { background: #e8e5db; animation-delay: 1s; }
    .bg2 { background: #b5c4a4; animation-delay: 0.3s; }
    .gg2 { background: #c9b97a; animation-delay: 0.8s; }
    .bg3 { background: #9aaa88; animation-delay: 1.3s; }

    @keyframes floatB {
      0%,100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-7px) rotate(4deg); }
    }

    .dino-wrap {
      display: flex;
      justify-content: center;
      margin-top: -30px;
      position: relative;
      z-index: 2;
    }

    .dino-svg {
      width: 130px;
      animation: dinoFloat 2.6s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(90,110,80,0.18));
    }

    @keyframes dinoFloat {
      0%,100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-9px) rotate(2deg); }
    }

    .body {
      padding: 4px 28px 28px;
      text-align: center;
    }

    .gold-dots { display: flex; justify-content: center; gap: 6px; margin: 14px 0 10px; }
    .gdot {
      width: 7px; height: 7px; border-radius: 50%; background: #c9b97a;
      animation: pulse 2s ease-in-out infinite;
    }
    .gdot:nth-child(2) { animation-delay: 0.3s; background: #7d8c6e; }
    .gdot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.4); opacity: 0.7; }
    }

    .from-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #9aaa88; font-weight: 700; margin-bottom: 4px; }
    .parents    { font-family: 'Playfair Display', serif; font-size: 22px; color: #4a5240; margin-bottom: 18px; }

    .divider    { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
    .div-line   { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #c9b97a, transparent); }
    .div-icon   { font-size: 16px; }

    .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }

    .icard {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e0d9c4;
      padding: 14px 10px;
      position: relative;
      overflow: hidden;
    }
    .icard::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9b97a, #9aaa88);
    }
    .icard-icon  { font-size: 20px; margin-bottom: 4px; display: block; }
    .icard-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #9aaa88; font-weight: 700; margin-bottom: 3px; }
    .icard-val   { font-family: 'Playfair Display', serif; font-size: 15px; color: #4a5240; line-height: 1.3; }

    .addr-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e0d9c4;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .addr-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9b97a, #9aaa88);
    }
    .addr-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #c9b97a, #a89650);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .addr-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #9aaa88; font-weight: 700; margin-bottom: 3px; }
    .addr-val   { font-family: 'Playfair Display', serif; font-size: 13px; color: #4a5240; line-height: 1.4; }

    .btn {
      background: linear-gradient(135deg, #7d8c6e, #4a5240);
      color: #f5f2ea;
      border: none;
      border-radius: 50px;
      padding: 15px 32px;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      cursor: pointer;
      width: 100%;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 22px rgba(74,82,64,0.28);
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,185,122,0.3), transparent);
      transition: left 0.5s;
    }
    .btn:hover::before { left: 150%; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,82,64,0.38); }
    .btn:active { transform: scale(0.97); }

    .footer { font-size: 12px; color: #9aaa88; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
